name: Build Android APK

on:
  # Trigger on push to main branch
  push:
    branches: [ main, master ]
  # Allow manual trigger from Actions tab
  workflow_dispatch:
  # Trigger on pull requests
  pull_request:
    branches: [ main, master ]

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 45
    
    steps:
    - name: Checkout repository
      uses: actions/checkout@v4
    
    - name: Set up Java
      uses: actions/setup-java@v4
      with:
        distribution: 'zulu'
        java-version: '17'
    
    - name: Set up Flutter
      uses: subosito/flutter-action@v2
      with:
        channel: 'stable'
        cache: true
    
    - name: Cache Gradle packages
      uses: actions/cache@v4
      with:
        path: |
          ~/.gradle/caches
          ~/.gradle/wrapper
        key: ${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}
        restore-keys: |
          ${{ runner.os }}-gradle-
    
    - name: Cache pub dependencies
      uses: actions/cache@v4
      with:
        path: |
          ${{ env.PUB_CACHE }}
          ~/.pub-cache
        key: ${{ runner.os }}-pub-${{ hashFiles('**/pubspec.lock') }}
        restore-keys: |
          ${{ runner.os }}-pub-
    
    - name: Setup Supabase config
      run: |
        # Create .env file with Supabase credentials and Google Maps API key from secrets
        if [ -n "${{ secrets.SUPABASE_URL }}" ] && [ -n "${{ secrets.SUPABASE_ANON_KEY }}" ]; then
          echo "Using real Supabase configuration from secrets"
          cat > .env << EOF
        SUPABASE_URL=${{ secrets.SUPABASE_URL }}
        SUPABASE_ANON_KEY=${{ secrets.SUPABASE_ANON_KEY }}
        GOOGLE_MAPS_API_KEY=${{ secrets.GOOGLE_MAPS_API_KEY }}
        EOF
          echo "✅ Supabase configuration created"
        else
          echo "⚠️ No Supabase credentials found in secrets"
          echo "Using placeholder values for build testing"
          cat > .env << EOF
        SUPABASE_URL=https://placeholder.supabase.co
        SUPABASE_ANON_KEY=placeholder-anon-key-for-build-only
        GOOGLE_MAPS_API_KEY=placeholder-api-key-for-build-only
        EOF
          echo ""
          echo "To enable real Supabase connection, add these secrets to your repository:"
          echo "  - SUPABASE_URL (your Supabase project URL)"
          echo "  - SUPABASE_ANON_KEY (your Supabase anon/public key)"
          echo "  - GOOGLE_MAPS_API_KEY (your Google Maps API key)"
        fi
    
    - name: Setup Android signing
      run: |
        # Create key.properties for signing
        if [ -n "${{ secrets.KEYSTORE_BASE64 }}" ]; then
          echo "Setting up release signing with keystore from secrets"
          
          # Decode and save keystore
          echo "${{ secrets.KEYSTORE_BASE64 }}" | base64 -d > android/app/optigasto-release-key.jks
          
          # Create key.properties
          cat > android/key.properties << EOF
        storePassword=${{ secrets.KEYSTORE_PASSWORD }}
        keyPassword=${{ secrets.KEY_PASSWORD }}
        keyAlias=${{ secrets.KEY_ALIAS }}
        storeFile=optigasto-release-key.jks
        EOF
          
          echo "✅ Release signing configured"
        else
          echo "⚠️ No keystore found in secrets - APK will be signed with debug keys"
          echo "To enable release signing, add these secrets to your repository:"
          echo "  - KEYSTORE_BASE64 (base64 encoded .jks file)"
          echo "  - KEYSTORE_PASSWORD"
          echo "  - KEY_PASSWORD"
          echo "  - KEY_ALIAS"
        fi
    
    - name: Setup Google Maps API Key
      run: |
        # Create local.properties with Google Maps API key
        if [ -n "${{ secrets.GOOGLE_MAPS_API_KEY }}" ]; then
          echo "Using Google Maps API key from secrets"
          echo "GOOGLE_MAPS_API_KEY=${{ secrets.GOOGLE_MAPS_API_KEY }}" >> android/local.properties
          echo "✅ Google Maps API key configured"
        else
          echo "⚠️ No Google Maps API key found in secrets"
          echo "Using placeholder value for build"
          echo "GOOGLE_MAPS_API_KEY=placeholder-api-key-for-build-only" >> android/local.properties
          echo ""
          echo "To enable Google Maps, add GOOGLE_MAPS_API_KEY secret to your repository"
        fi
    
    - name: Install dependencies
      run: flutter pub get
    
    - name: Analyze project for issues
      run: flutter analyze --no-fatal-infos || true
    
    - name: Disable Flutter file watcher
      run: |
        # Kill any existing file watchers
        pkill -f "dart.*file.*watch" || true
        # Ensure no stale processes
        sleep 2
    
    - name: Clear Gradle cache
      run: |
        rm -rf ~/.gradle/caches
        rm -rf build/

    - name: Build APK (Release)
      run: |
        export GRADLE_OPTS="-Dorg.gradle.jvmargs=-Xmx4096m -Dorg.gradle.daemon=false -Dorg.gradle.configuration-cache=false"
        
        # Build for multiple architectures
        echo "Building APK for release..."
        flutter build apk --release --no-track-widget-creation
        
        # Also build split APKs for smaller downloads
        echo "Building split APKs..."
        flutter build apk --release --split-per-abi --no-track-widget-creation
      timeout-minutes: 30
      env:
        FLUTTER_SUPPRESS_ANALYTICS: true
        PUB_CACHE: ${{ github.workspace }}/.pub-cache
    
    - name: Verify APK
      run: |
        echo "📦 APK Build Summary:"
        echo "===================="
        
        # List all generated APKs
        ls -lh build/app/outputs/flutter-apk/
        
        # Check if APK exists
        if [ -f "build/app/outputs/flutter-apk/app-release.apk" ]; then
          APK_SIZE=$(du -h build/app/outputs/flutter-apk/app-release.apk | cut -f1)
          echo "✅ Universal APK: $APK_SIZE"
        fi
        
        # Check split APKs
        for apk in build/app/outputs/flutter-apk/app-*-release.apk; do
          if [ -f "$apk" ]; then
            APK_SIZE=$(du -h "$apk" | cut -f1)
            APK_NAME=$(basename "$apk")
            echo "✅ Split APK: $APK_NAME ($APK_SIZE)"
          fi
        done
        
        echo "===================="
    
    - name: Upload Universal APK
      uses: actions/upload-artifact@v4
      with:
        name: optigasto-universal-apk
        path: build/app/outputs/flutter-apk/app-release.apk
        retention-days: 30
        if-no-files-found: error
    
    - name: Upload Split APKs
      uses: actions/upload-artifact@v4
      with:
        name: optigasto-split-apks
        path: build/app/outputs/flutter-apk/app-*-release.apk
        retention-days: 30
        if-no-files-found: warn
    
    - name: Create Release (on tag push)
      if: startsWith(github.ref, 'refs/tags/')
      uses: softprops/action-gh-release@v2
      with:
        files: build/app/outputs/flutter-apk/app-release.apk
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

