<!DOCTYPE html>
<html>
<head>
  <!--
    If you are serving your web app in a path other than the root, change the
    href value below to reflect the base path you are serving from.

    The path provided below has to start and end with a slash "/" in order for
    it to work correctly.

    For more details:
    * https://developer.mozilla.org/en-US/docs/Web/HTML/Element/base

    This is a placeholder for base href that will be replaced by the value of
    the `--base-href` argument provided to `flutter build`.
  -->
  <base href="$FLUTTER_BASE_HREF">

  <meta charset="UTF-8">
  <meta content="IE=Edge" http-equiv="X-UA-Compatible">
  <meta name="description" content="OptiGasto - Encuentra ofertas y promociones cerca de ti">

  <!-- Google Sign-In Client ID -->
  <meta name="google-signin-client_id" content="448966879427-h53d85de4aq6nb5s5210klhhusgt2v97.apps.googleusercontent.com">

  <!-- iOS meta tags & icons -->
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black">
  <meta name="apple-mobile-web-app-title" content="optigasto">
  <link rel="apple-touch-icon" href="icons/Icon-192.png">

  <!-- Favicon -->
  <link rel="icon" type="image/png" href="favicon.png"/>

  <title>optigasto</title>
  <link rel="manifest" href="manifest.json">
</head>
<body>
  <!-- Loading indicator -->
  <div id="loading" style="display: flex; justify-content: center; align-items: center; height: 100vh;">
    <p>Cargando OptiGasto...</p>
  </div>

  <!-- Google Maps JavaScript API - Se carga de forma síncrona -->
  <script src="https://maps.googleapis.com/maps/api/js?key=AIzaSyDqpoEiTL69S1Bv5stK2fl6ht_GxgMCoUA&loading=async"></script>
  
  <!-- Firebase Service Worker Registration -->
  <script>
    if ('serviceWorker' in navigator) {
      navigator.serviceWorker.register('/firebase-messaging-sw.js')
        .then((registration) => {
          console.log('Firebase Service Worker registered:', registration);
        })
        .catch((error) => {
          console.error('Firebase Service Worker registration failed:', error);
        });
    }
  </script>
  
  <script>
    // Esperar a que Google Maps esté completamente cargado
    function initializeApp() {
      // Ocultar loading indicator
      document.getElementById('loading').style.display = 'none';
      
      // Cargar Flutter
      var script = document.createElement('script');
      script.src = 'flutter_bootstrap.js';
      document.body.appendChild(script);
    }

    // Verificar si Google Maps está listo
    if (typeof google !== 'undefined' && typeof google.maps !== 'undefined') {
      initializeApp();
    } else {
      // Si no está listo, esperar un momento y reintentar
      setTimeout(initializeApp, 1000);
    }
  </script>
</body>
</html>
