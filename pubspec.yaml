name: optigasto
description: "Aplicación para encontrar ofertas y promociones geolocalizadas en Costa Rica"
publish_to: 'none'
version: 0.6.0+6

environment:
  sdk: ^3.5.0

dependencies:
  flutter:
    sdk: flutter

  # UI/UX
  cupertino_icons: ^1.0.8
  flutter_svg: ^2.0.10
  cached_network_image: ^3.3.1
  shimmer: ^3.0.0
  flutter_rating_bar: ^4.0.1
  badges: ^3.1.2
  animations: ^2.0.11
  fl_chart: ^0.69.0

  # State Management
  flutter_bloc: ^8.1.6
  equatable: ^2.0.5

  # Supabase
  supabase_flutter: ^2.5.0
  google_sign_in: ^6.2.1
  sign_in_with_apple: ^6.1.2

  # Maps & Location
  google_maps_flutter: ^2.9.0
  geolocator: ^12.0.0
  geocoding: ^3.0.0
  flutter_polyline_points: ^2.1.0

  # Images
  image_picker: ^1.1.2
  image_cropper: ^8.0.2
  flutter_image_compress: ^2.3.0

  # Networking
  dio: ^5.5.0+1
  connectivity_plus: ^6.0.5
  json_annotation: ^4.9.0

  # Local Storage
  shared_preferences: ^2.2.3
  hive: ^2.2.3
  hive_flutter: ^1.1.0
  flutter_secure_storage: ^9.2.2

  # Notifications
  flutter_local_notifications: ^17.2.2
  firebase_core: ^3.6.0
  firebase_messaging: ^15.1.3

  # Navigation
  go_router: ^14.2.7

  # UI
  confetti: ^0.7.0

  # Utils
  intl: ^0.19.0
  url_launcher: ^6.3.0
  share_plus: ^10.0.2
  qr_flutter: ^4.1.0
  permission_handler: ^11.3.1
  uuid: ^4.4.2
  logger: ^2.4.0
  path_provider: ^2.1.4
  path: ^1.9.0

  # Dependency Injection
  get_it: ^7.7.0
  injectable: ^2.4.4

  # Functional Programming
  dartz: ^0.10.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0

  # Code Generation
  build_runner: ^2.4.12
  json_serializable: ^6.8.0
  injectable_generator: ^2.6.2
  hive_generator: ^2.0.1

  # Testing
  mocktail: ^1.0.4

flutter:
  uses-material-design: true

  # Assets
  assets:
    - assets/images/
    - assets/icons/
    - assets/logos/

  # Fonts (se agregarán después)
